# Nginx reverse proxy: forwards public port 80 to gunicorn on 127.0.0.1:8000.
# Installed to /etc/nginx/sites-available/loanapp and symlinked into sites-enabled.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Proxy everything (including /static/) to gunicorn; Flask serves the static
    # files. This avoids Nginx (www-data) needing read access into /home/ubuntu.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
